<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --void:#0d0b14;
    --deep:#110f1c;
    --surface:#1a1630;
    --border:#2a2445;
    --purple:#8b2fc9;
    --magenta:#c93b7a;
    --amber:#e8a020;
    --cream:#f5f0e8;
    --muted:#6b5f88;
    --dim:#3d3458;
  }
  html{background:var(--void);color:var(--cream);font-family:'Space Mono',monospace;min-height:100vh}
  body{max-width:1100px;margin:0 auto;padding:0 16px 60px}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border)}
  .nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none}
  .nav-mark svg{width:44px;height:44px}
  .nav-wordmark{line-height:1}
  .nav-wordmark .top{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:4px;color:var(--cream);display:block}
  .nav-wordmark .sub{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:10px;letter-spacing:3px;color:var(--magenta);display:block;margin-top:2px}
  .nav-right{font-size:9px;letter-spacing:3px;color:var(--muted)}

  /* HERO */
  .hero{text-align:center;padding:44px 0 32px}
  .hero h1{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(32px,6vw,64px);letter-spacing:2px;line-height:1;color:var(--cream)}
  .hero h1 em{color:var(--magenta);font-style:italic}
  .hero p{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:14px}

  /* CONTROLS */
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px;padding:16px;background:var(--deep);border-radius:10px;border:1px solid var(--border)}
  .controls label{font-size:9px;letter-spacing:2px;color:var(--muted);margin-right:4px}
  .venue-filters{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .venue-chip{
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;
    padding:5px 10px;border-radius:20px;cursor:pointer;
    border:1px solid var(--border);background:transparent;color:var(--muted);
    transition:all .2s;white-space:nowrap;
  }
  .venue-chip:hover{border-color:var(--purple);color:var(--cream)}
  .venue-chip.active{background:var(--purple);border-color:var(--purple);color:#fff}
  .venue-chip.all.active{background:var(--magenta);border-color:var(--magenta)}
  .fetch-btn{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;
    padding:8px 18px;border-radius:6px;cursor:pointer;
    background:var(--magenta);border:none;color:#fff;
    transition:opacity .2s;white-space:nowrap;
  }
  .fetch-btn:hover{opacity:.85}
  .fetch-btn:disabled{opacity:.4;cursor:not-allowed}

  /* QUICK FILTERS */
  .quick-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .quick-label{font-size:8px;letter-spacing:2px;color:var(--dim);margin-right:4px}
  .quick-btn{
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;
    padding:5px 12px;border-radius:5px;cursor:pointer;
    border:1px solid var(--border);background:transparent;color:var(--muted);
    transition:all .2s;white-space:nowrap;
  }
  .quick-btn:hover{border-color:var(--amber);color:var(--cream)}
  .quick-btn.active{background:var(--amber);border-color:var(--amber);color:var(--void);font-weight:700}

  /* STATUS BAR */
  .status-bar{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:20px;min-height:18px;display:flex;align-items:center;gap:10px}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .status-dot.done{background:#4caf8a;animation:none}
  .status-dot.err{background:var(--magenta);animation:none}

  /* PROGRESS */
  .progress-wrap{margin-bottom:16px;display:none}
  .progress-wrap.visible{display:block}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--magenta));border-radius:2px;transition:width .4s ease;width:0%}
  .progress-venues{display:flex;flex-wrap:wrap;gap:6px}
  .progress-venue{
    font-size:8px;letter-spacing:1.5px;padding:3px 8px;border-radius:12px;
    border:1px solid var(--border);color:var(--dim);transition:all .3s;
  }
  .progress-venue.loading{border-color:var(--amber);color:var(--amber);animation:pulse 1.2s ease-in-out infinite}
  .progress-venue.done{border-color:#4caf8a;color:#4caf8a;animation:none}
  .progress-venue.err{border-color:var(--magenta);color:var(--magenta);animation:none}
  .progress-venue .pv-count{margin-left:4px;opacity:.6}

  /* MONTH NAV */
  .month-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
  .month-nav button{
    background:none;border:1px solid var(--border);color:var(--muted);
    font-family:'Space Mono',monospace;font-size:11px;
    padding:6px 12px;border-radius:5px;cursor:pointer;transition:all .2s;
  }
  .month-nav button:hover{border-color:var(--purple);color:var(--cream)}
  .month-title{font-family:'Playfair Display',serif;font-weight:900;font-size:28px;color:var(--cream);letter-spacing:1px;flex:1}
  .month-count{font-size:9px;letter-spacing:2px;color:var(--muted)}

  /* DATA SOURCE BADGE */
  .data-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:8px;letter-spacing:1.5px;color:var(--dim);
    padding:4px 10px;border-radius:12px;border:1px solid var(--border);
    margin-left:12px;
  }
  .data-badge .live-dot{width:5px;height:5px;border-radius:50%;background:#4caf8a}
  .data-badge.stale .live-dot{background:var(--amber)}

  /* CALENDAR GRID */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
  .cal-day-name{font-size:8px;letter-spacing:2px;color:var(--dim);text-align:center;padding:6px 0}
  .cal-cell{
    background:var(--deep);border-radius:6px;min-height:88px;padding:6px;
    border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .15s;
  }
  .cal-cell:hover{border-color:var(--purple)}
  .cal-cell.today{border-color:var(--magenta)}
  .cal-cell.other-month{opacity:.35}
  .cal-cell.empty{background:transparent;border-color:transparent}
  .day-num{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px}
  .cal-cell.today .day-num{color:var(--magenta)}

  .event-dot{
    font-size:8px;line-height:1.3;padding:2px 5px;border-radius:3px;margin-bottom:2px;
    border-left:2px solid var(--purple);background:rgba(139,47,201,.12);
    color:var(--cream);cursor:pointer;transition:background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .event-dot:hover{background:rgba(139,47,201,.3)}
  .event-dot.magenta{border-left-color:var(--magenta);background:rgba(201,59,122,.12)}
  .event-dot.magenta:hover{background:rgba(201,59,122,.3)}
  .event-dot.amber{border-left-color:var(--amber);background:rgba(232,160,32,.12)}
  .event-dot.amber:hover{background:rgba(232,160,32,.3)}
  .more-events{font-size:8px;color:var(--muted);letter-spacing:1px;padding:1px 4px;cursor:pointer}
  .more-events:hover{color:var(--cream)}

  /* LIST VIEW */
  .view-toggle{display:flex;gap:4px;margin-left:auto}
  .view-btn{
    background:none;border:1px solid var(--border);color:var(--muted);
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;
    padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s;
  }
  .view-btn.active{background:var(--surface);border-color:var(--purple);color:var(--cream)}

  .list-view{display:none;flex-direction:column;gap:3px}
  .list-view.visible{display:flex}
  .cal-grid-wrap.list-mode .cal-grid{display:none}
  .cal-grid-wrap.list-mode .list-view{display:flex}

  .list-event{
    display:flex;align-items:stretch;gap:0;
    background:var(--deep);border:1px solid var(--border);border-radius:8px;overflow:hidden;
    cursor:pointer;transition:border-color .15s;
  }
  .list-event:hover{border-color:var(--purple)}
  .list-event-date{
    width:60px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--surface);padding:12px 8px;
  }
  .list-date-day{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--cream);line-height:1}
  .list-date-month{font-size:8px;letter-spacing:2px;color:var(--muted);margin-top:2px}
  .list-event-body{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .list-event-venue{font-size:8px;letter-spacing:2px;color:var(--purple)}
  .list-event-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:var(--cream)}
  .list-event-meta{font-size:9px;color:var(--muted)}
  .list-event-action{
    display:flex;align-items:center;padding:0 14px;
    font-size:9px;letter-spacing:1px;color:var(--magenta);white-space:nowrap;
  }

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(13,11,20,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--deep);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:480px;width:100%;position:relative;box-shadow:0 0 60px rgba(139,47,201,.2)}
  .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
  .modal-venue{font-size:9px;letter-spacing:3px;color:var(--purple);margin-bottom:8px}
  .modal-title{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;color:var(--cream);margin-bottom:12px;line-height:1.2}
  .modal-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
  .modal-meta-row{font-size:10px;color:var(--muted);display:flex;gap:10px;align-items:baseline}
  .modal-meta-row strong{color:var(--cream);letter-spacing:1px}
  .modal-desc{font-size:11px;line-height:1.7;color:var(--muted);margin-bottom:20px;border-top:1px solid var(--border);padding-top:14px}
  .modal-cta{
    display:inline-block;text-decoration:none;
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;
    padding:10px 20px;border-radius:6px;
    background:var(--magenta);color:#fff;transition:opacity .2s;
  }
  .modal-cta:hover{opacity:.85}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state svg{margin:0 auto 16px;display:block;opacity:.3}
  .empty-state p{font-size:10px;letter-spacing:2px}

  /* FOOTER */
  footer{text-align:center;padding:32px 0 0;border-top:1px solid var(--border);font-size:9px;letter-spacing:2px;color:var(--dim)}
  footer span{color:var(--magenta)}
  footer a{color:var(--purple);text-decoration:none}
  footer a:hover{text-decoration:underline}

  /* LAST FETCHED */
  .last-fetched{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-align:center;margin-top:12px}

  @media(max-width:600px){
    .cal-grid{grid-template-columns:repeat(7,1fr);gap:1px}
    .cal-cell{min-height:56px;padding:3px}
    .event-dot{display:none}
    .more-events{display:block!important}
    .controls{flex-direction:column;align-items:flex-start}
    .month-nav{gap:8px;flex-wrap:wrap}
    .quick-filters{gap:6px}
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>

<div class="controls">

<script>
// ============================================================
// TRIANGLETUNAGE — Production Build
// ============================================================
// Architecture:
//   1. On load, check localStorage for cached events (4hr TTL)
//   2. If cache is fresh, render immediately (instant UX)
//   3. If stale/empty, user clicks "Load Shows" to fetch
//   4. Each venue fetched via Claude API + web_search tool
//   5. Results cached in localStorage for next visit
// ============================================================

const CACHE_KEY = 'tt_events';
const CACHE_TIME_KEY = 'tt_events_time';
const CACHE_TTL = 4 * 60 * 60 * 1000; // 4 hours in ms

const VENUES = {
  motorco: {
    name: 'Motorco Music Hall', city: 'Durham', color: 'purple',
    searchQuery: 'Motorco Music Hall Durham NC upcoming concerts',
    calendarUrl: 'https://motorcomusic.com/calendar/',
    ticketBase: 'https://www.etix.com/ticket/v/2000/motorco-music-hall',
    isEtix: true,
  },
  pourhouse: {
    name: 'The Raleigh Pourhouse', city: 'Raleigh', color: 'magenta',
    searchQuery: 'Raleigh Pourhouse upcoming concerts live music',
    calendarUrl: 'https://www.etix.com/ticket/v/13617/the-pourhouse-downtown',
    ticketBase: 'https://www.etix.com/ticket/v/13617/the-pourhouse-downtown',
    isEtix: true,
  },
  bowstring: {

// ---- LOCALSTORAGE CACHE ----
function saveToCache(events) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(events));
    localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
  } catch (e) {
    console.warn('Cache write failed:', e);
  }
}

function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    const time = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0');
    if (!raw) return null;

    const age = Date.now() - time;
    const events = JSON.parse(raw);
    const isFresh = age < CACHE_TTL;

    return { events, time, age, isFresh };
  } catch (e) {
    console.warn('Cache read failed:', e);
    return null;
  }
}

function formatCacheAge(ms) {
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

// ---- VENUE FILTER ----
function toggleVenue(id, el) {
  const chips = document.querySelectorAll('.venue-chip:not(.all)');
  const allChip = document.querySelector('.venue-chip.all');
  if (id === 'all') {
    if (activeVenues.size === chips.length) {
      activeVenues.clear();
      chips.forEach(c => c.classList.remove('active'));
      allChip.classList.remove('active');
    } else {
      activeVenues = new Set(Object.keys(VENUES));
      chips.forEach(c => c.classList.add('active'));
      allChip.classList.add('active');
    }
  } else {
    el.classList.toggle('active');
    if (activeVenues.has(id)) activeVenues.delete(id);
    else activeVenues.add(id);
    allChip.classList.toggle('active', activeVenues.size === chips.length);
  }
  renderCalendar();
}

// ---- QUICK FILTERS ----
function setQuickFilter(filter) {
  quickFilter = filter;
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('q' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('active');

  // Switch to list view for quick filters (more useful than calendar for "tonight")
  if (filter !== 'all') {
    setView('list');
  }
  renderCalendar();
}

function getQuickFilteredEvents(events) {
  if (quickFilter === 'all') return events;

  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];

  if (quickFilter === 'tonight') {
    return events.filter(e => e.date === todayStr);
  }

  if (quickFilter === 'weekend') {
    // Find this coming Friday, Saturday, Sunday
    const day = now.getDay(); // 0=Sun
    const daysToFri = day <= 5 ? (5 - day) : 6; // days until Friday
    const fri = new Date(now); fri.setDate(fri.getDate() + daysToFri);
    const sun = new Date(fri); sun.setDate(sun.getDate() + 2);
    const friStr = fri.toISOString().split('T')[0];
    const sunStr = sun.toISOString().split('T')[0];
    // If we're already in the weekend (Fri-Sun), include today
    if (day === 0 || day === 5 || day === 6) {
      const startStr = todayStr;
      return events.filter(e => e.date >= startStr && e.date <= sunStr);
    }
    return events.filter(e => e.date >= friStr && e.date <= sunStr);
  }

  if (quickFilter === 'week') {
    const endOfWeek = new Date(now);
    endOfWeek.setDate(endOfWeek.getDate() + 7);
    const endStr = endOfWeek.toISOString().split('T')[0];
    return events.filter(e => e.date >= todayStr && e.date <= endStr);
  }

  return events;
}

// ---- FETCH REAL SHOWS ----
// Calls our Netlify serverless function which handles:
//   Tier 1: SeatGeek API for major venues
//   Tier 2: Claude + web search for indie venues
// API keys are stored securely in Netlify environment variables

async function fetchShows() {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '&#9654; SCANNING...';
  setStatus('loading', 'Fetching live show data from venues...');

  // Show simple progress (we don't get per-venue updates from the single API call)
  const progressWrap = document.getElementById('progressWrap');
  progressWrap.classList.add('visible');
  document.getElementById('progressFill').style.width = '30%';
  document.getElementById('progressVenues').innerHTML =
    '<span class="progress-venue loading">SEATGEEK (TIER 1)</span>' +
    '<span class="progress-venue loading">CLAUDE + WEB SEARCH (TIER 2)</span>';

  try {
    const response = await fetch('/api/events');

    document.getElementById('progressFill').style.width = '80%';

    if (!response.ok) {
      throw new Error(`Server returned ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();

    document.getElementById('progressFill').style.width = '100%';

    if (data.events && data.events.length > 0) {
      allEvents = data.events;
      saveToCache(allEvents);
      updateCacheBadge(0, true);

      // Update progress indicators
      const meta = data.meta || {};
      const r = meta.results || {};
      const t1 = r.tier1 || {};
      const t2 = r.tier2 || {};
      document.getElementById('progressVenues').innerHTML =
        `<span class="progress-venue done">SEATGEEK: ${t1.success || 0} venues</span>` +
        `<span class="progress-venue done">CLAUDE: ${t2.success || 0} venues</span>` +
        (t1.failed || t2.failed ? `<span class="progress-venue err">${(t1.failed || 0) + (t2.failed || 0)} failed</span>` : '');

      setStatus('done', `Loaded ${allEvents.length} real upcoming shows`);
    } else {
      setStatus('err', 'No shows found — venues may not have current listings');
    }

    renderCalendar();
  } catch (err) {
    console.error('Fetch error:', err);
    setStatus('err', `Could not load shows — ${err.message}`);
    document.getElementById('progressVenues').innerHTML =
      '<span class="progress-venue err">FETCH FAILED</span>';
  }

  setTimeout(() => {
    document.getElementById('progressWrap').classList.remove('visible');
  }, 2000);

  isLoading = false;
  btn.disabled = false;
  btn.innerHTML = '&#9654; LOAD SHOWS';
}

// ---- CACHE BADGE ----
function updateCacheBadge(age, isFresh) {
  const badge = document.getElementById('dataBadge');
  const fetched = document.getElementById('lastFetched');
  if (isFresh) {
    badge.innerHTML = `<span class="data-badge"><span class="live-dot"></span>LIVE DATA</span>`;
  } else {
    badge.innerHTML = `<span class="data-badge stale"><span class="live-dot"></span>CACHED (${formatCacheAge(age)})</span>`;
  }
  const time = new Date(Date.now() - age);
  fetched.textContent = `Last updated: ${time.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })}`;
}

// ---- CALENDAR ----
const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function shiftMonth(dir) {
  quickFilter = 'all';
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('qAll').classList.add('active');
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  renderCalendar();
}

function setView(v) {
  currentView = v;
  document.getElementById('calBtn').classList.toggle('active', v === 'cal');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
  document.getElementById('calWrap').classList.toggle('list-mode', v === 'list');
  renderCalendar();
}

function getFilteredEvents() {
  let events = allEvents.filter(e => activeVenues.has(e.venueId));
  events = getQuickFilteredEvents(events);
  return events;
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date();

  document.getElementById('monthTitle').textContent = `${MONTH_NAMES[month]} ${year}`;

  const allFiltered = getFilteredEvents();
  const filtered = (quickFilter === 'all')
    ? allFiltered.filter(e => {
        const d = new Date(e.date + 'T12:00:00');
        return d.getFullYear() === year && d.getMonth() === month;
      })
    : allFiltered; // quick filters already constrain dates

  document.getElementById('monthCount').textContent = filtered.length ? `${filtered.length} SHOWS` : '';

  if (currentView === 'list') { renderList(filtered); return; }
  renderGrid(year, month, filtered, today);
}

function renderGrid(year, month, filtered, today) {
  const names = document.getElementById('dayNames');
  names.innerHTML = DAY_NAMES.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  const grid = document.getElementById('calGrid');
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  // For calendar view with quick filters, still filter by current month
  const monthFiltered = (quickFilter !== 'all')
    ? filtered.filter(e => {
        const d = new Date(e.date + 'T12:00:00');
        return d.getFullYear() === year && d.getMonth() === month;
      })
    : filtered;

  const byDate = {};
  monthFiltered.forEach(e => {
    const d = new Date(e.date + 'T12:00:00').getDate();
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  });

  let cells = '';
  // Store events by date for the "more" click handler
  window._eventsByDate = {};
  
  for (let i = 0; i < firstDay; i++) {
    const d = daysInPrev - firstDay + i + 1;
    cells += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const events = byDate[d] || [];
    window._eventsByDate[d] = events;
    const shown = events.slice(0, 2);
    const extra = events.length - shown.length;

    const dotsHtml = shown.map(e => {
      const v = VENUES[e.venueId];
      return `<div class="event-dot ${v.color}" onclick="openModal(${JSON.stringify(e).split('"').join('&quot;')})" title="${e.title}">${e.title}</div>`;
    }).join('');
    const moreHtml = extra > 0 ? `<div class="more-events" onclick="showDayEvents(${d})">+${extra} more</div>` : '';

    cells += `<div class="cal-cell${isToday ? ' today' : ''}">
      <div class="day-num">${d}</div>
      ${dotsHtml}${moreHtml}
    </div>`;
  }
  const total = firstDay + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }

  grid.innerHTML = cells;
  document.getElementById('listView').innerHTML = '';
}

function renderList(filtered) {
  document.getElementById('dayNames').innerHTML = '';
  document.getElementById('calGrid').innerHTML = '';

  const lv = document.getElementById('listView');
  if (!filtered.length) {
    const emptyMsg = quickFilter === 'tonight' ? 'NO SHOWS TONIGHT' :
                     quickFilter === 'weekend' ? 'NO SHOWS THIS WEEKEND' :
                     quickFilter === 'week' ? 'NO SHOWS THIS WEEK' :
                     'NO SHOWS FOUND THIS MONTH';
    lv.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 120 120"><polygon points="60,10 108,92 12,92" fill="none" stroke="#3d3458" stroke-width="3"/><path d="M40,60 Q50,53 60,60 Q70,67 80,60" fill="none" stroke="#3d3458" stroke-width="2"/></svg><p>${emptyMsg}<br/>TRY LOADING OR CHANGING FILTERS</p></div>`;
    return;
  }
  const sorted = [...filtered].sort((a,b) => new Date(a.date) - new Date(b.date));
  lv.innerHTML = sorted.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    const v = VENUES[e.venueId];
    const day = d.getDate();
    const mon = MONTH_NAMES[d.getMonth()].slice(0,3).toUpperCase();
    return `<div class="list-event" onclick="openModal(${JSON.stringify(e).split('"').join('&quot;')})">
      <div class="list-event-date"><div class="list-date-day">${day}</div><div class="list-date-month">${mon}</div></div>
      <div class="list-event-body">
        <div class="list-event-venue" style="color:var(--${v.color})">${v.name.toUpperCase()} &middot; ${v.city.toUpperCase()}</div>
        <div class="list-event-title">${e.title}</div>
        <div class="list-event-meta">${e.time}${e.doors ? ' &nbsp;&bull;&nbsp; DOORS ' + e.doors : ''} &nbsp;&bull;&nbsp; ${e.price} &nbsp;&bull;&nbsp; ${e.genre}</div>
      </div>
      <div class="list-event-action">${e.isEtix ? '<span style="color:var(--amber)">ETIX &nbsp;</span>' : ''}TICKETS &rarr;</div>
    </div>`;
  }).join('');
}

// ---- SHOW ALL EVENTS FOR A DAY ----
function showDayEvents(day) {
  const events = window._eventsByDate[day] || [];
  if (!events.length) return;
  
  // Switch to list view filtered to just this day
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  
  // Temporarily show a modal-like list of all events for this day
  const v_list = events.map(e => {
    const v = VENUES[e.venueId];
    return `<div class="list-event" style="margin-bottom:4px" onclick="closeModal();openModal(${JSON.stringify(e).split('"').join('&quot;')})">
      <div class="list-event-body">
        <div class="list-event-venue" style="color:var(--${v.color})">${v.name.toUpperCase()}</div>
        <div class="list-event-title">${e.title}</div>
        <div class="list-event-meta">${e.time} &nbsp;&bull;&nbsp; ${e.price} &nbsp;&bull;&nbsp; ${e.genre}</div>
      </div>
    </div>`;
  }).join('');
  
  const dayName = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  
  document.getElementById('mVenue').textContent = dayName.toUpperCase();
  document.getElementById('mTitle').textContent = `${events.length} Shows`;
  document.getElementById('mMeta').innerHTML = v_list;
  document.getElementById('mDesc').textContent = '';
  document.getElementById('mCta').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
}

// ---- MODAL ----
function openModal(e) {
  if (typeof e === 'string') e = JSON.parse(e.split('&quot;').join('"'));
  const v = VENUES[e.venueId];
  document.getElementById('mVenue').textContent = `${v.name.toUpperCase()} · ${v.city.toUpperCase()}`;
  document.getElementById('mTitle').textContent = e.title;

  let sourceHtml = '';
  if (e.source) {
    try {
      sourceHtml = `<div class="modal-meta-row" style="font-size:8px;margin-top:4px">Source: <a href="${e.source}" target="_blank" rel="noopener" style="color:var(--purple);text-decoration:underline">${new URL(e.source).hostname}</a></div>`;
    } catch (err) {
      sourceHtml = '';
    }
  }

  document.getElementById('mMeta').innerHTML = `
    <div class="modal-meta-row"><strong>${new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</strong></div>
    <div class="modal-meta-row">Show: <strong>${e.time}</strong>${e.doors ? `&nbsp;&nbsp;Doors: <strong>${e.doors}</strong>` : ''}</div>
    <div class="modal-meta-row">Tickets: <strong>${e.price}</strong>${e.isEtix ? '&nbsp;&nbsp;<span style="color:var(--amber);font-size:8px;letter-spacing:1px">&#9654; ON ETIX</span>' : ''}</div>
    <div class="modal-meta-row">Genre: <strong>${e.genre}</strong></div>
    ${sourceHtml}`;
  document.getElementById('mDesc').textContent = e.description;
  document.getElementById('mCta').href = e.ticketUrl;
  document.getElementById('mCta').style.display = 'inline-block';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(ev) {
  if (!ev || ev.target === document.getElementById('modalBg') || ev.currentTarget.tagName === 'BUTTON') {
    document.getElementById('modalBg').classList.remove('open');
  }
}

// Escape key closes modal
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') closeModal();
});

    cells += `<div class="cal-cell${isToday?' today':''}"><div class="day-num">${d}</div></div>`;
  }
  const total = firstDay + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML = cells;

  // Try loading from cache
  const cached = loadFromCache();
  if (cached && cached.events.length > 0) {
    allEvents = cached.events;
    updateCacheBadge(cached.age, cached.isFresh);
    if (cached.isFresh) {
      setStatus('done', `Showing ${allEvents.length} cached shows`);
    } else {
      setStatus('done', `Showing ${allEvents.length} cached shows (${formatCacheAge(cached.age)} — tap Load to refresh)`);
    }
    renderCalendar();
  }
}

init();
</script>
</body>
</html>
